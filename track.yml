title: 321-MITRE ATT&CK - Insights
teaser: A practical self-paced course covering the MITRE ATT&CK framework from foundations
  to incident response, with Illumio Insights mapped throughout.
description: |-
  This self-paced course teaches the MITRE ATT&CK framework from the ground up and connects every concept directly to Illumio Insights. Five core assignments take you from framework foundations through threat actor research to a full incident response workflow.

  A sixth optional assignment covers the ATT&CK Navigator, Sub-Techniques, Mitigations, and defensive coverage mapping in depth.

  Estimated completion time: 1.5 hours (core, Modules 1–5) or 2.5 hours (full course including Module 6)
  Audience: Security professionals, SOC analysts, and Illumio practitioners
